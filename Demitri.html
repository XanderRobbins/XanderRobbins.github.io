<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ Crash Course // SYSTEM BOOT</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Oxanium:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--bg2:#0f1520;--bg3:#141c2b;
  --cyan:#00e5ff;--blue:#1e88e5;--green:#00e676;
  --amber:#ffab00;--red:#ff1744;--purple:#d500f9;
  --text:#c8d6e5;--text-dim:#5a6a7e;--text-bright:#e8f0fe;
  --glow:0 0 20px rgba(0,229,255,.15);
  --border:#1a2540;
}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden}
::selection{background:var(--cyan);color:var(--bg)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--cyan)}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{
  width:280px;min-width:280px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;
  transition:transform .3s ease;
}
.sidebar.closed{transform:translateX(-100%)}
.main{flex:1;margin-left:280px;transition:margin .3s ease}
.main.expanded{margin-left:0}

/* SIDEBAR */
.logo{padding:1.2rem;border-bottom:1px solid var(--border);text-align:center}
.logo h1{font-family:'Oxanium',sans-serif;font-size:1.1rem;color:var(--cyan);letter-spacing:2px;text-transform:uppercase}
.logo .sub{font-size:.65rem;color:var(--text-dim);margin-top:4px;letter-spacing:3px}
.progress-bar{margin:1rem;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:2px;transition:width .5s ease;width:0}
.progress-label{text-align:center;font-size:.65rem;color:var(--text-dim);margin-bottom:.5rem}
.nav{flex:1;overflow-y:auto;padding:.5rem 0}
.nav-unit{margin-bottom:.25rem}
.nav-unit-title{
  padding:.6rem 1rem;font-family:'Oxanium',sans-serif;font-size:.7rem;
  color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  display:flex;align-items:center;gap:.5rem;transition:color .2s;
}
.nav-unit-title:hover{color:var(--cyan)}
.nav-unit-title .arrow{transition:transform .3s;font-size:.6rem}
.nav-unit-title.open .arrow{transform:rotate(90deg)}
.nav-lessons{max-height:0;overflow:hidden;transition:max-height .4s ease}
.nav-lessons.open{max-height:600px}
.nav-item{
  padding:.45rem 1rem .45rem 2rem;font-size:.75rem;color:var(--text-dim);
  cursor:pointer;display:flex;align-items:center;gap:.5rem;
  transition:all .2s;border-left:2px solid transparent;
}
.nav-item:hover{color:var(--text);background:rgba(0,229,255,.03)}
.nav-item.active{color:var(--cyan);border-left-color:var(--cyan);background:rgba(0,229,255,.05)}
.nav-item.completed{color:var(--green)}
.nav-item .dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0}
.nav-item.completed .dot{background:var(--green)}
.nav-item.active .dot{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}

/* HAMBURGER */
.hamburger{
  display:none;position:fixed;top:1rem;left:1rem;z-index:200;
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:.5rem .6rem;cursor:pointer;color:var(--cyan);font-size:1.2rem;
}

/* CONTENT */
.content{max-width:820px;margin:0 auto;padding:2rem 2rem 4rem}
.lesson-header{margin-bottom:2rem}
.lesson-unit-label{font-family:'Oxanium',sans-serif;font-size:.65rem;color:var(--cyan);letter-spacing:3px;text-transform:uppercase;margin-bottom:.5rem}
.lesson-title{font-family:'Oxanium',sans-serif;font-size:1.8rem;color:var(--text-bright);font-weight:700;line-height:1.3}
.lesson-body{line-height:1.85;font-size:.88rem}
.lesson-body h3{font-family:'Oxanium',sans-serif;color:var(--amber);margin:1.8rem 0 .8rem;font-size:1rem;letter-spacing:1px}
.lesson-body p{margin-bottom:1rem}
.lesson-body ul{margin:0 0 1rem 1.5rem;list-style:none}
.lesson-body ul li{position:relative;padding-left:1rem;margin-bottom:.4rem}
.lesson-body ul li::before{content:'▹';position:absolute;left:0;color:var(--cyan)}
.lesson-body strong{color:var(--text-bright)}
.lesson-body em{color:var(--amber);font-style:normal}
.lesson-body code{background:var(--bg);padding:2px 6px;border-radius:3px;color:var(--green);font-size:.82rem}

/* CODE BLOCKS */
.code-block{
  background:#080c14;border:1px solid var(--border);border-radius:8px;
  margin:1.2rem 0;overflow:hidden;
}
.code-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.5rem 1rem;background:var(--bg2);border-bottom:1px solid var(--border);
  font-size:.65rem;color:var(--text-dim);
}
.code-header .lang{color:var(--cyan);font-family:'Oxanium',sans-serif;letter-spacing:1px}
.copy-btn{
  background:none;border:1px solid var(--border);color:var(--text-dim);
  padding:2px 8px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:.65rem;
  transition:all .2s;
}
.copy-btn:hover{border-color:var(--cyan);color:var(--cyan)}
pre{padding:1rem;overflow-x:auto;font-size:.8rem;line-height:1.7;color:var(--text)}
pre .kw{color:#c792ea}
pre .type{color:#82aaff}
pre .str{color:#c3e88d}
pre .num{color:#f78c6c}
pre .cmt{color:#546e7a;font-style:italic}
pre .fn{color:#82aaff}
pre .inc{color:#89ddff}
pre .op{color:#89ddff}
pre .cls{color:#ffcb6b}

/* CALLOUT */
.callout{
  border-left:3px solid var(--amber);background:rgba(255,171,0,.04);
  padding:1rem 1.2rem;margin:1.2rem 0;border-radius:0 6px 6px 0;font-size:.82rem;
}
.callout.tip{border-left-color:var(--green);background:rgba(0,230,118,.04)}
.callout.warn{border-left-color:var(--red);background:rgba(255,23,68,.04)}
.callout-title{font-family:'Oxanium',sans-serif;font-size:.7rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:.4rem;color:var(--amber)}
.callout.tip .callout-title{color:var(--green)}
.callout.warn .callout-title{color:var(--red)}

/* QUIZ */
.quiz{
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:1.5rem;margin:1.5rem 0;
}
.quiz-q{font-family:'Oxanium',sans-serif;color:var(--text-bright);margin-bottom:1rem;font-size:.9rem}
.quiz-opts{display:flex;flex-direction:column;gap:.5rem}
.quiz-opt{
  padding:.6rem 1rem;background:var(--bg);border:1px solid var(--border);
  border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .2s;
}
.quiz-opt:hover{border-color:var(--cyan);color:var(--text-bright)}
.quiz-opt.correct{border-color:var(--green);background:rgba(0,230,118,.08);color:var(--green)}
.quiz-opt.wrong{border-color:var(--red);background:rgba(255,23,68,.08);color:var(--red)}
.quiz-opt.disabled{pointer-events:none;opacity:.7}
.quiz-explain{margin-top:.8rem;font-size:.78rem;color:var(--text-dim);display:none;line-height:1.6}

/* NAV BUTTONS */
.lesson-nav{display:flex;justify-content:space-between;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.nav-btn{
  padding:.6rem 1.2rem;background:var(--bg2);border:1px solid var(--border);
  border-radius:6px;color:var(--text);cursor:pointer;font-family:inherit;
  font-size:.78rem;transition:all .2s;display:flex;align-items:center;gap:.5rem;
}
.nav-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.nav-btn.primary{background:rgba(0,229,255,.08);border-color:var(--cyan);color:var(--cyan)}
.nav-btn:disabled{opacity:.3;pointer-events:none}

/* BOOT SCREEN */
.boot-overlay{
  position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  transition:opacity .6s ease;
}
.boot-overlay.done{opacity:0;pointer-events:none}
.boot-text{font-size:.75rem;color:var(--cyan);text-align:left;width:380px;max-width:90vw}
.boot-text .line{opacity:0;margin-bottom:.3rem}
.boot-cursor{display:inline-block;width:7px;height:14px;background:var(--cyan);animation:blink 1s infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:block}
  .content{padding:3.5rem 1.2rem 4rem}
  .lesson-title{font-size:1.4rem}
}
</style>
</head>
<body>

<div class="boot-overlay" id="boot">
  <div class="boot-text" id="bootText"></div>
</div>

<button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <h1>C++ Crash Course</h1>
      <div class="sub">Full Language // Zero Prereqs</div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 0 completed</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main class="main" id="main">
    <div class="content" id="content"></div>
  </main>
</div>

<script>
// ============================================================
//  FULL C++ CURRICULUM DATA
// ============================================================
const COURSE = [
{
  unit: "Unit 1: Foundations",
  lessons: [
  {
    title: "Hello, World & Program Structure",
    body: `
<p>Every C++ program begins with a <em>main</em> function. The operating system calls <code>main()</code> when your program starts. Here's the classic first program:</p>

<div class="code-block"><div class="code-header"><span class="lang">C++</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<pre><span class="inc">#include</span> <span class="str">&lt;iostream&gt;</span>

<span class="type">int</span> <span class="fn">main</span>() {
    std::cout <span class="op">&lt;&lt;</span> <span class="str">"Hello, World!"</span> <span class="op">&lt;&lt;</span> std::endl;
    <span class="kw">return</span> <span class="num">0</span>;
}</pre></div>

<h3>Breaking It Down</h3>
<p><code>#include &lt;iostream&gt;</code> pulls in the I/O library so you can use <code>std::cout</code> (console output) and <code>std::cin</code> (console input).</p>
<p><code>int main()</code> — the entry point. The <code>int</code> means it returns an integer to the OS. <code>return 0</code> means "everything went fine."</p>
<p><code>std::cout &lt;&lt; "text"</code> — the <strong>insertion operator</strong> sends text to the output stream. <code>std::endl</code> flushes the buffer and prints a newline (you can also use <code>"\\n"</code> which is faster).</p>

<div class="callout tip"><div class="callout-title">Tip</div>You can add <code>using namespace std;</code> after the includes to skip writing <code>std::</code> everywhere. It's convenient for small programs but avoided in large codebases to prevent name clashes.</div>
`,
    quiz: {q:"What does `return 0` in main() signify?", opts:["The program produced zero output","Successful program termination","The program has zero errors at compile time","The loop ran zero times"], answer:1, explain:"By convention, returning 0 from main tells the OS the program finished successfully. Non-zero values indicate errors."}
  },
  {
    title: "Variables & Fundamental Types",
    body: `
<p>C++ is <strong>statically typed</strong> — every variable needs a type declared at compile time.</p>

<div class="code-block"><div class="code-header"><span class="lang">C++</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<pre><span class="type">int</span> age = <span class="num">21</span>;              <span class="cmt">// integer</span>
<span class="type">double</span> gpa = <span class="num">3.85</span>;         <span class="cmt">// floating point (64-bit)</span>
<span class="type">float</span> temp = <span class="num">98.6f</span>;        <span class="cmt">// floating point (32-bit)</span>
<span class="type">char</span> grade = <span class="str">'A'</span>;           <span class="cmt">// single character</span>
<span class="type">bool</span> passed = <span class="kw">true</span>;        <span class="cmt">// boolean</span>
<span class="type">std::string</span> name = <span class="str">"Xander"</span>; <span class="cmt">// needs &lt;string&gt;</span>

<span class="cmt">// Modern C++ (C++11+): auto deduces the type</span>
<span class="kw">auto</span> count = <span class="num">42</span>;            <span class="cmt">// deduced as int</span>
<span class="kw">auto</span> pi = <span class="num">3.14159</span>;         <span class="cmt">// deduced as double</span></pre></div>

<h3>Key Integer Types</h3>
<p><code>int</code> is typically 32 bits (±2 billion). <code>long long</code> gives you 64 bits. <code>short</code> is 16 bits. Prefix with <code>unsigned</code> to disallow negatives and double the positive range.</p>

<h3>Constants</h3>
<div class="code-block"><div class="code-header"><span class="lang">C++</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<pre><span class="kw">const</span> <span class="type">double</span> PI = <span class="num">3.14159265</span>;
<span class="kw">constexpr</span> <span class="type">int</span> MAX = <span class="num">1000</span>;  <span class="cmt">// evaluated at compile time</span></pre></div>

<div class="callout"><div class="callout-title">Key Insight</div><code>const</code> means "can't change after init." <code>constexpr</code> (C++11) goes further — the value must be computable at compile time, enabling optimizations.</div>
`,
    quiz: {q:"What's the difference between `float` and `double`?", opts:["float is signed, double is unsigned","float is 32-bit precision, double is 64-bit","float stores characters, double stores strings","There is no difference"], answer:1, explain:"float uses 32 bits (~7 decimal digits of precision), double uses 64 bits (~15 digits). double is the default for decimal literals in C++."}
  },
  {
    title: "Operators & Expressions",
    body: `
<h3>Arithmetic</h3>
<p><code>+</code> <code>-</code> <code>*</code> <code>/</code> <code>%</code> (modulo). Integer division truncates: <code>7 / 2</code> gives <code>3</code>, not <code>3.5</code>. Cast one operand to <code>double</code> if you want the decimal.</p>

<h3>Comparison & Logical</h3>
<p>Comparison: <code>==</code> <code>!=</code> <code>&lt;</code> <code>&gt;</code> <code>&lt;=</code> <code>&gt;=</code>. These return <code>bool</code>.</p>
<p>Logical: <code>&&</code> (AND), <code>||</code> (OR), <code>!</code> (NOT). They short-circuit — <code>&&</code> stops if the left side is false, <code>||</code> stops if the left side is true.</p>

<h3>Bitwise</h3>
<div class="code-block"><div class="code-header"><span class="lang">C++</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<pre><span class="type">int</span> a = <span class="num">0b1010</span>;  <span class="cmt">// 10 in binary</span>
<span class="type">int</span> b = <span class="num">0b1100</span>;  <span class="cmt">// 12</span>
a <span class="op">&</span> b;   <span class="cmt">// AND  → 0b1000 (8)</span>
a <span class="op">|</span> b;   <span class="cmt">// OR   → 0b1110 (14)</span>
a <span class="op">^</span> b;   <span class="cmt">// XOR  → 0b0110 (6)</span>
<span class="op">~</span>a;      <span class="cmt">// NOT  (flips all bits)</span>
a <span class="op">&lt;&lt;</span> <span class="num">1</span>;  <span class="cmt">// left shift  → 20</span>
a <span class="op">&gt;&gt;</span> <span class="num">1</span>;  <span class="cmt">// right shift → 5</span></pre></div>

<h3>Increment / Compound</h3>
<p><code>i++</code> (post-increment), <code>++i</code> (pre-increment), <code>+=</code>, <code>-=</code>, <code>*=</code>, <code>/=</code>, etc.</p>

<div class="callout warn"><div class="callout-title">Watch Out</div>Don't confuse <code>=</code> (assignment) with <code>==</code> (comparison). Writing <code>if (x = 5)</code> assigns 5 to x and always evaluates true. Classic bug.</div>
`,
    quiz:{q:"What does `7 / 2` evaluate to in C++ (both operands are int)?", opts:["3.5","3","4","Compiler error"], answer:1, explain:"Integer division truncates the decimal. Both operands are int, so the result is int: 3."}
  },
  {
    title: "Input / Output & Formatting",
    body: `
<h3>Console I/O</h3>
<div class="code-block"><div class="code-header"><span class="lang">C++</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<pre><span class="inc">#include</span> <span class="str">&lt;iostream&gt;</span>
<span class="inc">#include</span> <span class="str">&lt;string&gt;</span>

<span class="type">int</span> <span class="fn">main</span>() {
    std::string name;
    <span class="type">int</span> age;

    std::cout <span class="op">&lt;&lt;</span> <span class="str">"Name: "</span>;
    std::getline(std::cin, name);  <span class="cmt">// reads whole line</span>

    std::cout <span class="op">&lt;&lt;</span> <span class="str">"Age: "</span>;
    std::cin <span class="op">&gt;&gt;</span> age;              <span class="cmt">// reads one token</span>

    std::cout <span class="op">&lt;&lt;</span> <span class="str">"Hi "</span> <span class="op">&lt;&lt;</span> name <span class="op">&lt;&lt;</span> <span class="str">", you are "</span>
              <span class="op">&lt;&lt;</span> age <span class="op">&lt;&lt;</span> <span class="str">" years old.\\n"</span>;
}</pre></div>

<div class="callout warn"><div class="callout-title">Common Trap</div>Mixing <code>cin &gt;&gt;</code> and <code>getline</code> is dangerous. <code>&gt;&gt;</code> leaves the newline in the buffer, so the next <code>getline</code> reads an empty string. Fix: call <code>cin.ignore()</code> between them.</div>

<h3>Formatting (C++20 std::format)</h3>
<div class="code-block"><div class="code-header"><span class="lang">C++</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<pre><span class="inc">#include</span> <span class="str">&lt;format&gt;</span>    <span class="cmt">// C++20</span>
std::cout <span class="op">&lt;&lt;</span> std::format(<span class="str">"Pi is {:.4f}\\n"</span>, <span class="num">3.14159</span>);
<span class="cmt">// Output: Pi is 3.1416</span></pre></div>

<p>Before C++20, you'd use <code>&lt;iomanip&gt;</code> with <code>std::setprecision</code>, <code>std::fixed</code>, etc. — it works, but it's verbose.</p>
`,
    quiz:{q:"What happens if you use `cin >>` then `getline()` without clearing the buffer?", opts:["Segfault","getline reads the leftover newline and appears to skip input","Compiler error","It works fine"], answer:1, explain:"cin >> leaves the trailing newline. getline reads up to the next newline, which is immediately — giving you an empty string. Use cin.ignore() to discard the newline."}
  }
  ]
},
{
  unit: "Unit 2: Control Flow",
  lessons: [
  {
    title: "Conditionals: if, else, switch",
    body: `
<div class="code-block"><div class="code-header"><span class="lang">C++</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<pre><span class="kw">if</span> (score >= <span class="num">90</span>) {
    grade = <span class="str">'A'</span>;
} <span class="kw">else if</span> (score >= <span class="num">80</span>) {
    grade = <span class="str">'B'</span>;
} <span class="kw">else</span> {
    grade = <span class="str">'C'</span>;
}

<span class="cmt">// Ternary: compact one-liners</span>
std::string result = (passed) ? <span class="str">"yes"</span> : <span class="str">"no"</span>;

<span class="cmt">// Switch: great for discrete values</span>
<span class="kw">switch</span> (menuChoice) {
    <span class="kw">case</span> <span class="num">1</span>: doThing(); <span class="kw">break</span>;
    <span class="kw">case</span> <span class="num">2</span>: doOther(); <span class="kw">break</span>;
    <span class="kw">default</span>: std::cout <span class="op">&lt;&lt;</span> <span class="str">"Invalid\\n"</span>;
}</pre></div>

<div class="callout warn"><div class="callout-title">Classic Bug</div>Forgetting <code>break</code> in a switch causes <strong>fall-through</strong> — execution continues into the next case. Sometimes intentional, usually a bug.</div>

<h3>C++17: if with initializer</h3>
<div class="code-block"><div class="code-header"><span class="lang">C++</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<pre><span class="kw">if</span> (<span class="kw">auto</span> it = map.find(key); it != map.end()) {
    <span class="cmt">// use *it — 'it' is scoped to this if block</span>
}</pre></div>
<p>This keeps the variable scoped tightly — cleaner than declaring it outside.</p>
`,
    quiz:{q:"What happens if you forget `break` in a switch case?", opts:["Compiler error","The program crashes","Execution falls through to the next case","Nothing, break is optional and has no effect"], answer:2, explain:"Without break, execution continues (falls through) into subsequent cases until it hits a break or the end of the switch block."}
  },
  {
    title: "Loops: for, while, do-while",
    body: `
<div class="code-block"><div class="code-header"><span class="lang">C++</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<pre><span class="cmt">// Standard for loop</span>
<span class="kw">for</span> (<span class="type">int</span> i = <span class="num">0</span>; i < <span class="num">10</span>; i++) {
    std::cout <span class="op">&lt;&lt;</span> i <span class="op">&lt;&lt;</span> <span class="str">" "</span>;
}

<span class="cmt">// Range-based for (C++11) — the modern way</span>
std::vector<span class="op">&lt;</span><span class="type">int</span><span class="op">&gt;</span> nums = {<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="num">4</span>};
<span class="kw">for</span> (<span class="type">int</span> n : nums) {
    std::cout <span class="op">&lt;&lt;</span> n <span class="op">&lt;&lt;</span> <span class="str">" "</span>;
}

<p>Pointers are just variables that hold memory addresses. They're fundamental to C++ — you can't avoid them.</p>

<div class="callout warn"><div class="callout-title">Danger</div>Dereferencing a null or dangling pointer is <strong>undefined behavior</strong> — your program might crash, silently corrupt data, or appear to work. Always check before dereferencing.</div>

<div class="callout warn"><div class="callout-title">Memory Leaks</div>If you <code>new</code> without <code>delete</code>, that memory is leaked forever (until the program exits). If you <code>delete</code> twice, undefined behavior. This is why modern C++ uses smart pointers.</div>

<h3>Smart Pointers (C++11) — use these instead</h3>

<span class="cmt">// freed when last shared_ptr dies</span></pre></div>

<div class="callout tip"><div class="callout-title">Modern Rule</div>Almost never use <code>new</code>/<code>delete</code> directly. Use <code>make_unique</code> for single ownership and <code>make_shared</code> when multiple parts of your code need to share an object.</div>

<span class="kw">template</span><span class="op">&lt;</span><span class="kw">typename</span> T<span class="op">&gt;</span>
T <span class="fn">maxOf</span>(T a, T b) {
    <span class="kw">return</span> (a > b) ? a : b;
}

maxOf(<span class="num">3</span>, <span class="num">7</span>);        <span class="cmt">// T = int</span>
maxOf(<span class="num">3.14</span>, <span class="num">2.72</span>);  <span class="cmt">// T = double</span>
maxOf<span class="op">&lt;</span>std::string<span class="op">&gt;</span>(<span class="str">"a"</span>, <span class="str">"b"</span>);  <span class="cmt">// explicit</span>

<span class="cmt">// Class template</span>
<span class="kw">template</span><span class="op">&lt;</span><span class="kw">typename</span> T<span class="op">&gt;</span>
<span class="kw">class</span> <span class="cls">Stack</span> {
    std::vector<span class="op">&lt;</span>T<span class="op">&gt;</span> data_;
<span class="kw">public</span>:
    <span class="type">void</span> <span class="fn">push</span>(<span class="kw">const</span> T<span class="op">&</span> val) { data_.push_back(val); }
    T <span class="fn">pop</span>() {

        <span class="kw">return</span> top;
    }
    <span class="type">bool</span> <span class="fn">empty</span>() <span class="kw">const</span> { <span class="kw">return</span> data_.empty(); }

<div class="callout"><div class="callout-title">How It Works</div>Templates aren't compiled until used. When you call <code>maxOf(3, 7)</code>, the compiler <strong>instantiates</strong> a version with T=int. This means template code typically goes in header files, not .cpp files.</div>

<h3>Common Exception Types</h3>
<p><code>std::runtime_error</code> — general runtime problems. <code>std::invalid_argument</code> — bad input. <code>std::out_of_range</code> — index problems. <code>std::logic_error</code> — programmer bugs. All inherit from <code>std::exception</code>.</p>

<h3>RAII & Exception Safety</h3>
<p>Because destructors run automatically when objects go out of scope (even during stack unwinding from exceptions), well-written C++ code is naturally exception-safe. This pattern is called <strong>RAII</strong> — manage resources (memory, files, locks) in constructors/destructors.</p>

<div class="code-block"><div class="code-header"><span class="lang">C++</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div>
<pre><span class="cmt">// RAII file wrapper — file always gets closed</span>
<span class="kw">class</span> <span class="cls">FileHandle</span> {
    std::ofstream file_;
<span class="kw">public</span>:
    <span class="fn">FileHandle</span>(<span class="kw">const</span> std::string<span class="op">&</span> path) : file_(path) {
        <span class="kw">if</span> (!file_) <span class="kw">throw</span> std::runtime_error(<span class="str">"Can't open"</span>);
    }
    <span class="op">~</span><span class="fn">FileHandle</span>() { file_.close(); }  <span class="cmt">// guaranteed cleanup</span>
};</pre></div>

<div class="callout tip"><div class="callout-title">Modern Approach</div>Use <code>std::optional</code> (C++17) for "might not have a value" cases instead of throwing. Use exceptions for truly exceptional failures. Use <code>std::expected</code> (C++23) for error-or-value returns.</div>

<span class="kw">public</span>:

  // Close sidebar on mobile
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

function renderLesson() {
  const data = getLessonData(currentLesson);
  if (!data) return;
  const { unit, lesson } = data;
  const content = document.getElementById('content');

  let quizHTML = '';
  if (lesson.quiz) {
    const q = lesson.quiz;
    quizHTML = `
    <div class="quiz" id="quiz">
      <div class="quiz-q">⚡ ${q.q}</div>
      <div class="quiz-opts">
        ${q.opts.map((o, i) => `<div class="quiz-opt" onclick="checkAnswer(${i}, ${q.answer})">${o}</div>`).join('')}
      </div>
      <div class="quiz-explain" id="quizExplain">${q.explain}</div>
    </div>`;
  }

  content.innerHTML = `
    <div class="lesson-header">
      <div class="lesson-unit-label">${unit}</div>
      <div class="lesson-title">${lesson.title}</div>
    </div>
    <div class="lesson-body">${lesson.body}</div>
    ${quizHTML}
    <div class="lesson-nav">
      <button class="nav-btn" onclick="goToLesson(${currentLesson - 1})" ${currentLesson === 0 ? 'disabled' : ''}>← Previous</button>
      <button class="nav-btn primary" onclick="completeAndNext()">
        ${currentLesson < totalLessons - 1 ? 'Complete & Next →' : 'Complete Course ✓'}
      </button>
    </div>
  `;
}

function checkAnswer(selected, correct) {
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((o, i) => {
    o.classList.add('disabled');
    if (i === correct) o.classList.add('correct');
    else if (i === selected) o.classList.add('wrong');
  });
  document.getElementById('quizExplain').style.display = 'block';
}

function completeAndNext() {
  completed.add(currentLesson);
  saveProgress();
  if (currentLesson < totalLessons - 1) {
    goToLesson(currentLesson + 1);
  } else {
    buildNav();
    document.getElementById('content').innerHTML = `
      <div style="text-align:center;padding:4rem 1rem">
        <div style="font-size:3rem;margin-bottom:1rem">🎉</div>
        <div style="font-family:'Oxanium',sans-serif;font-size:1.8rem;color:var(--cyan);margin-bottom:1rem">COURSE COMPLETE</div>
        <p style="color:var(--text-dim);max-width:500px;margin:0 auto;line-height:1.8">
          You've covered the full C++ language — from Hello World to move semantics and STL algorithms.
          Now go build something. That's how it sticks.
        </p>
        <button class="nav-btn primary" style="margin:2rem auto" onclick="goToLesson(0)">← Back to Start</button>
      </div>`;
  }
}

function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent);
  btn.textContent = 'copied!';
  setTimeout(() => btn.textContent = 'copy', 1500);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ============================================================
//  INIT
// ============================================================
boot();
buildNav();
renderLesson();
</script>
</body>
</html>
